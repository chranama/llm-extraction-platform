apiVersion: v1
kind: Namespace
metadata:
  name: llm
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: policy-runner
  namespace: llm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: policy-runner
  namespace: llm
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: policy-runner
  namespace: llm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: policy-runner
subjects:
- kind: ServiceAccount
  name: policy-runner
  namespace: llm
---
apiVersion: v1
data:
  server.yaml: |-
    service:
      name: "llm-extraction-platform"
      version: "0.1.0"
      debug: false
      env: "dev"

    server:
      host: "0.0.0.0"
      port: 8000

    # Database: in-cluster DNS name from postgres Service
    database:
      url: "postgresql+asyncpg://llm:llm@postgres:5432/llm"

    # Redis: in-cluster DNS name from redis Service
    redis:
      enabled: true
      url: "redis://redis:6379/0"

    # Model policy defaults (safe for dev)
    model:
      # keep aligned with config/models.yaml you mount or bake into image
      default_id: "meta-llama/Llama-3.2-1B-Instruct"
      dtype: "float16"
      device: "cpu"
      # your backend uses env vars for this too
      # (kept here for clarity/documentation)
      load_mode: "off"

    limits:
      rate_limit_rpm:
        admin: 0
        default: 120
        free: 60
      quota_auto_reset_days: 30

    cache:
      api_key_cache_ttl_seconds: 10
kind: ConfigMap
metadata:
  name: llm-config
  namespace: llm
---
apiVersion: v1
data:
  models.yaml: |
    base:
      default_model: meta-llama/Llama-3.2-1B-Instruct
      defaults:
        backend: transformers
        load_mode: eager
        capabilities:
          generate: true
          extract: true
        readiness_mode: generate
        deployment_key: prod-gpu-full
        deployment:
          profile_id: prod-gpu-full
          models_profile: prod-gpu-full
          expected:
            in_docker: true
            accelerator: cuda
            precision: float16
        assessment:
          lane: offline
          policy_schema: policy_decision_v2
          require_for_extract: true
          assessed: true
      models: []

    profiles:
      prod-gpu-full:
        default_model: meta-llama/Llama-3.2-1B-Instruct
        defaults:
          backend: transformers
          load_mode: eager
          capabilities:
            generate: true
            extract: true
          readiness_mode: generate
          deployment_key: prod-gpu-full
          deployment:
            profile_id: prod-gpu-full
            models_profile: prod-gpu-full
            expected:
              in_docker: true
              accelerator: cuda
              precision: float16
          assessment:
            lane: offline
            policy_schema: policy_decision_v2
            require_for_extract: true
            assessed: true
        models:
          - id: meta-llama/Llama-3.2-1B-Instruct
            backend: transformers
            load_mode: eager
            capabilities:
              generate: true
              extract: true
            deployment_key: prod-gpu-full--llama32-1b
            transformers:
              device: cuda
              dtype: float16
              trust_remote_code: false
            assessment:
              assessed: true
              status: allowed
              assessed_at_utc: "2026-03-12T00:00:00Z"
              assessed_by: canonical_scaffold
              assessed_pipeline: extract_only
              thresholds_profile: extract/default
            notes: "Production-oriented scaffold profile for full-capability render validation."
kind: ConfigMap
metadata:
  name: llm-models
  namespace: llm
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-secrets
  namespace: llm
stringData:
  API_KEY: ""
  DATABASE_URL: postgresql+asyncpg://llm:llm@postgres:5432/llm
  HF_TOKEN: ""
  POSTGRES_DB: llm
  POSTGRES_PASSWORD: llm
  POSTGRES_USER: llm
  REDIS_URL: redis://redis:6379/0
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: llm
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: api
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: llm
spec:
  ports:
  - name: pg
    port: 5432
    targetPort: 5432
  selector:
    app: postgres
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: llm
spec:
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
  selector:
    app: redis
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-cache
  namespace: llm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - env:
        - name: ENV
          value: prod
        - name: MODEL_LOAD_MODE
          value: eager
        - name: REQUIRE_MODEL_READY
          value: "1"
        - name: MODEL_DEVICE
          value: gpu
        - name: MODELS_YAML
          value: /app/models/models.yaml
        - name: REDIS_ENABLED
          value: "true"
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: APP_ROOT
          value: /app
        - name: APP_CONFIG_PATH
          value: /app/config/server.yaml
        - name: DEBUG
          value: "true"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: llm-secrets
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              key: REDIS_URL
              name: llm-secrets
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              key: HF_TOKEN
              name: llm-secrets
        image: ghcr.io/<github-username>/<repo-name>/llm-server:main
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 6
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
        name: api
        ports:
        - containerPort: 8000
        readinessProbe:
          failureThreshold: 12
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
        resources:
          limits:
            cpu: "4"
            memory: 16Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "1"
            memory: 4Gi
            nvidia.com/gpu: "1"
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /healthz
            port: 8000
          periodSeconds: 2
          timeoutSeconds: 2
        volumeMounts:
        - mountPath: /app/models
          name: llm-models
          readOnly: true
        - mountPath: /root/.cache/huggingface
          name: hf-cache
        - mountPath: /app/config
          name: llm-config
          readOnly: true
      volumes:
      - configMap:
          items:
          - key: models.yaml
            path: models.yaml
          name: llm-models
        name: llm-models
      - name: hf-cache
        persistentVolumeClaim:
          claimName: hf-cache
      - configMap:
          items:
          - key: server.yaml
            path: server.yaml
          name: llm-config
        name: llm-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: llm-secrets
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: llm-secrets
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              key: POSTGRES_DB
              name: llm-secrets
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - sh
            - -lc
            - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
          initialDelaySeconds: 10
          periodSeconds: 10
        name: postgres
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
            command:
            - sh
            - -lc
            - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - args:
        - redis-server
        - --save
        - ""
        - --appendonly
        - "no"
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - sh
            - -lc
            - redis-cli ping | grep PONG
          initialDelaySeconds: 10
          periodSeconds: 10
        name: redis
        ports:
        - containerPort: 6379
        readinessProbe:
          exec:
            command:
            - sh
            - -lc
            - redis-cli ping | grep PONG
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: llm
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      containers:
      - command:
        - sh
        - -lc
        - |
          set -euo pipefail

          echo "Waiting for database readiness..."
          for i in $(seq 1 60); do
            if python -c "import socket; s = socket.create_connection(('postgres', 5432), 5); s.close()"; then
              echo "ok"
              break
            fi
            sleep 2
          done

          echo "Running alembic migrations..."
          python -m alembic -c /app/server/alembic.ini upgrade head
        env:
        - name: ENV
          value: dev
        - name: APP_ROOT
          value: /app
        - name: APP_CONFIG_PATH
          value: /app/config/server.yaml
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: llm-secrets
        - name: REDIS_ENABLED
          value: "false"
        image: llm-server:dev
        imagePullPolicy: IfNotPresent
        name: migrate
        volumeMounts:
        - mountPath: /app/config
          name: llm-config
          readOnly: true
      restartPolicy: Never
      volumes:
      - configMap:
          items:
          - key: server.yaml
            path: server.yaml
          name: llm-config
        name: llm-config
  ttlSecondsAfterFinished: 3600
---
apiVersion: batch/v1
kind: Job
metadata:
  name: policy-gate
  namespace: llm
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
      - args:
        - |
          set -euo pipefail

          echo "[kubectl] update configmap/${MODELS_CONFIGMAP_NAME} from patched file..."
          kubectl -n llm create configmap "${MODELS_CONFIGMAP_NAME}" \
            --from-file="${MODELS_FILE_KEY}=/work/models.yaml" \
            -o yaml --dry-run=client \
          | kubectl -n llm apply -f -

          if [ "${ROLLOUT_RESTART_API}" = "1" ]; then
            echo "[kubectl] rollout restart deployment/${API_DEPLOYMENT_NAME}..."
            kubectl -n llm rollout restart "deployment/${API_DEPLOYMENT_NAME}"
          fi

          echo "[kubectl] done."
        command:
        - /bin/sh
        - -lc
        env:
        - name: MODELS_CONFIGMAP_NAME
          value: llm-models
        - name: MODELS_FILE_KEY
          value: models.yaml
        - name: API_DEPLOYMENT_NAME
          value: api
        - name: ROLLOUT_RESTART_API
          value: "1"
        image: bitnami/kubectl:1.30
        imagePullPolicy: IfNotPresent
        name: apply-configmap
        volumeMounts:
        - mountPath: /work
          name: work
      initContainers:
      - args:
        - |
          set -euo pipefail

          echo "[policy] copy models.yaml from configmap mount..."
          test -f "/in/${MODELS_FILE_KEY}"
          cp "/in/${MODELS_FILE_KEY}" /work/models.yaml

          echo "[policy] run decide-and-patch..."
          llm-policy decide-and-patch \
            --run-dir "${POLICY_RUN_DIR}" \
            --models-yaml /work/models.yaml \
            --model-id "${POLICY_MODEL_ID}" \
            --threshold-profile "${POLICY_THRESHOLD_PROFILE}" \
            --thresholds-root "${POLICY_THRESHOLDS_ROOT}" \
            --format text

          echo "[policy] patched file:"
          head -n 40 /work/models.yaml
        command:
        - /bin/sh
        - -lc
        env:
        - name: MODELS_FILE_KEY
          value: models.yaml
        - name: POLICY_RUN_DIR
          value: /results/run
        - name: POLICY_MODEL_ID
          value: meta-llama/Llama-3.2-1B-Instruct
        - name: POLICY_THRESHOLD_PROFILE
          value: extract/default
        - name: POLICY_THRESHOLDS_ROOT
          value: /app/policy/src/llm_policy/thresholds
        image: llm-policy:dev
        imagePullPolicy: IfNotPresent
        name: run-policy
        volumeMounts:
        - mountPath: /in
          name: models
          readOnly: true
        - mountPath: /work
          name: work
        - mountPath: /results
          name: results
      restartPolicy: Never
      serviceAccountName: policy-runner
      volumes:
      - emptyDir: {}
        name: work
      - configMap:
          name: llm-models
        name: models
      - emptyDir: {}
        name: results
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  name: llm-ingress
  namespace: llm
spec:
  ingressClassName: nginx
  rules:
  - host: llm.example.com
    http:
      paths:
      - backend:
          service:
            name: api
            port:
              number: 8000
        path: /api(/|$)(.*)
        pathType: ImplementationSpecific
