name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------
  # Server: unit + lint/format
  # -------------------------
  server_unit:
    name: server (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          set -euxo pipefail
          pipx install uv
          uv --version
          python -V

      - name: Sync deps (server)
        run: |
          set -euxo pipefail
          uv sync --extra test --extra lint

      - name: Lint (ruff)
        run: |
          set -euxo pipefail
          uv run ruff check .

      - name: Format check (black) [temporary noop]
        run: |
          set -euxo pipefail
          echo "Skipping server black --check temporarily; scheduled for dedicated formatting batch."

      - name: Run unit tests
        env:
          PYTHONPATH: "src"
          ENV: "test"
          DATABASE_URL: "sqlite+aiosqlite:///./ci_unit.db"
          REDIS_ENABLED: "0"
          MODEL_LOAD_MODE: "off"
          REQUIRE_MODEL_READY: "0"
        run: |
          set -euxo pipefail
          for attempt in 1 2; do
            uv run python -m pytest -q -ra --maxfail=1 --disable-warnings tests/unit \
              --cov=llm_server --cov-report=term --cov-report=xml --cov-fail-under=70 && break
            if [ "${attempt}" -eq 2 ]; then
              exit 1
            fi
            echo "server unit pytest failed on attempt ${attempt}; retrying once..."
          done

      - name: Upload coverage (server unit)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: server/coverage.xml
          fail_ci_if_error: false

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== server unit debug ==="
          uv --version
          python -V
          uv pip list
          git status --porcelain || true


  # -------------------------
  # Server: integration
  # -------------------------
  server_integration:
    name: server (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: llm
          POSTGRES_PASSWORD: llm
          POSTGRES_DB: llm_test
        ports:
          - 5432/tcp
        options: >-
          --health-cmd="pg_isready -U llm -d llm_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379/tcp
        options: >-
          --health-cmd="redis-cli ping | grep PONG"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          set -euxo pipefail
          pipx install uv
          uv --version
          python -V

      - name: Sync deps (server)
        run: |
          set -euxo pipefail
          uv sync --extra test

      - name: Run integration tests
        env:
          PYTHONPATH: "src"
          ENV: "test"
          DATABASE_URL: "postgresql+asyncpg://llm:llm@127.0.0.1:${{ job.services.postgres.ports[5432] }}/llm_test"
          REDIS_ENABLED: "1"
          REDIS_URL: "redis://127.0.0.1:${{ job.services.redis.ports[6379] }}/0"
          MODEL_LOAD_MODE: "off"
          REQUIRE_MODEL_READY: "0"
        run: |
          set -euxo pipefail
          # If your integration suite requires migrations in CI, uncomment:
          # uv run python -m alembic upgrade head
          for attempt in 1 2; do
            uv run python -m pytest -q -ra --maxfail=1 --disable-warnings tests/integration && break
            if [ "${attempt}" -eq 2 ]; then
              exit 1
            fi
            echo "server integration pytest failed on attempt ${attempt}; retrying once..."
          done

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== server integration debug ==="
          docker ps -a || true
          docker logs ${{ job.services.postgres.id }} || true
          docker logs ${{ job.services.redis.id }} || true


  # -------------------------
  # Policy: unit + lint/format
  # -------------------------
  policy_unit:
    name: policy (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: policy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          set -euxo pipefail
          pipx install uv
          uv --version
          python -V

      - name: Sync deps (policy)
        run: |
          set -euxo pipefail
          uv sync --extra test --extra lint

      - name: Lint (ruff)
        run: |
          set -euxo pipefail
          uv run ruff check .

      - name: Format check (black) [temporary noop]
        run: |
          set -euxo pipefail
          echo "Skipping policy black --check temporarily; scheduled for dedicated formatting batch."

      - name: Run policy unit tests
        env:
          PYTHONPATH: "src"
        run: |
          set -euxo pipefail
          uv run python -m pytest -q -ra --maxfail=1 --disable-warnings tests/unit \
            --cov=llm_policy --cov-report=term --cov-report=xml --cov-fail-under=75

      - name: Upload coverage (policy unit)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: policy/coverage.xml
          fail_ci_if_error: false

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== policy debug ==="
          uv --version
          python -V
          uv pip list
          git status --porcelain || true

  policy_integration:
    name: policy (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: policy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          set -euxo pipefail
          pipx install uv
          uv --version
          python -V

      - name: Sync deps (policy)
        run: |
          set -euxo pipefail
          uv sync --extra test

      - name: Run policy integration tests
        env:
          PYTHONPATH: "src"
        run: |
          set -euxo pipefail
          uv run python -m pytest -q -ra --maxfail=1 --disable-warnings tests/integration

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== policy integration debug ==="
          uv --version
          python -V
          uv pip list
          git status --porcelain || true


  # -------------------------
  # UI: vitest
  # -------------------------
  ui_test:
    name: ui (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install deps
        run: |
          set -euxo pipefail
          npm ci

      - name: Run tests with coverage gate
        env:
          VITE_API_KEY: "dev"
          VITE_API_BASE_URL: "/api"
        run: |
          set -euxo pipefail
          npm run test:coverage

      - name: Build (optional but useful)
        run: |
          set -euxo pipefail
          npm run build

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== ui debug ==="
          node -v
          npm -v
          cat package.json


  # -------------------------
  # UI: Playwright E2E
  # -------------------------
  ui_e2e:
    name: ui (e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install deps
        run: |
          set -euxo pipefail
          npm ci

      - name: Install Playwright browser (Chromium)
        run: |
          set -euxo pipefail
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        env:
          CI: "true"
        run: |
          set -euxo pipefail
          npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-playwright-report
          path: |
            ui/playwright-report
            ui/test-results
          if-no-files-found: ignore

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== ui e2e debug ==="
          node -v
          npm -v
          cat package.json


  # -------------------------
  # Eval: unit (unmarked tests)
  # -------------------------
  eval_unit:
    name: eval (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: eval
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          set -euxo pipefail
          pipx install uv
          uv --version
          python -V

      - name: Sync deps (eval)
        run: |
          set -euxo pipefail
          uv sync --extra test --extra lint

      - name: Lint (ruff)
        run: |
          set -euxo pipefail
          uv run ruff check .

      - name: Format check (black) [temporary noop]
        run: |
          set -euxo pipefail
          echo "Skipping eval black --check temporarily; scheduled for dedicated formatting batch."

      - name: Run eval unit tests
        env:
          PYTHONPATH: "src"
        run: |
          set -euxo pipefail
          uv run python -m pytest -q -ra --maxfail=1 --disable-warnings tests/unit \
            --cov=llm_eval --cov-report=term --cov-report=xml --cov-fail-under=85

      - name: Upload coverage (eval unit)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: eval/coverage.xml
          fail_ci_if_error: false

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== eval unit debug ==="
          uv --version
          python -V
          uv pip list
          git status --porcelain || true


  # -------------------------
  # Eval: integration (contract)
  # -------------------------
  eval_integration_contract:
    name: eval (integration-contract)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
        working-directory: eval
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          set -euxo pipefail
          pipx install uv
          uv --version
          python -V

      - name: Sync deps (eval)
        run: |
          set -euxo pipefail
          uv sync --extra test

      - name: Run eval integration contract tests
        env:
          PYTHONPATH: "src"
        run: |
          set -euxo pipefail
          uv run python -m pytest -q -ra --maxfail=1 --disable-warnings \
            -m integration_contract tests/integration

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== eval integration contract debug ==="
          uv --version
          python -V
          uv pip list
          git status --porcelain || true

  # -------------------------
  # Integrations: repo-level job lanes (non-live, split)
  # -------------------------
  integrations_job_lane:
    name: integrations (${{ matrix.lane.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane:
          - name: eval-job
            path: test_eval_job
          - name: policy-job
            path: test_policy_job
          - name: e2e-loop
            path: test_e2e_loop
    defaults:
      run:
        shell: bash
        working-directory: integrations
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          set -euxo pipefail
          pipx install uv
          uv --version
          python -V

      - name: Sync deps (integrations)
        run: |
          set -euxo pipefail
          uv sync

      - name: Run integrations lane
        env:
          PYTHONPATH: "${{ github.workspace }}"
          INTEGRATIONS_TIMEOUT: "30"
        run: |
          set -euxo pipefail
          uv run pytest -q -ra --maxfail=1 --disable-warnings \
            -m "not server_live" \
            --junitxml "pytest-${{ matrix.lane.name }}.xml" \
            "${{ matrix.lane.path }}"

      - name: Enforce no unexpected skips (core integrations lanes)
        run: |
          set -euxo pipefail
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("pytest-${{ matrix.lane.name }}.xml")
          root = ET.parse(report).getroot()
          skipped = sum(int(ts.attrib.get("skipped", "0")) for ts in root.iter("testsuite"))
          if skipped:
              raise SystemExit(f"Unexpected skipped tests in core lane: {skipped} (report={report})")
          print(f"skip-check ok: 0 skips in {report}")
          PY

      - name: Upload integrations junit report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integrations-junit-${{ matrix.lane.name }}
          path: integrations/pytest-${{ matrix.lane.name }}.xml
          if-no-files-found: ignore

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== integrations lane debug (${{ matrix.lane.path }}) ==="
          uv --version
          python -V
          uv pip list
          git status --porcelain || true


  # -------------------------
  # Integrations: live server lane (optional)
  # -------------------------
  integrations_server_live:
    name: integrations (server-live)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
        working-directory: integrations
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          set -euxo pipefail
          pipx install uv
          uv --version
          python -V

      - name: Sync deps (integrations)
        run: |
          set -euxo pipefail
          uv sync

      - name: Resolve live lane inputs
        id: live_inputs
        env:
          LIVE_BASE_URL: "${{ vars.INTEGRATIONS_BASE_URL }}"
          LIVE_API_KEY: "${{ secrets.INTEGRATIONS_API_KEY }}"
        run: |
          set -euxo pipefail
          if [ -n "${LIVE_BASE_URL}" ] && [ -n "${LIVE_API_KEY}" ]; then
            echo "run_live=true" >> "$GITHUB_OUTPUT"
            echo "base_url=${LIVE_BASE_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "run_live=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Live integrations skipped::Set vars.INTEGRATIONS_BASE_URL and secrets.INTEGRATIONS_API_KEY to enable integrations/test_server_live."
          fi

      - name: Run live server integration tests
        if: steps.live_inputs.outputs.run_live == 'true'
        env:
          PYTHONPATH: "${{ github.workspace }}"
          INTEGRATIONS_TIMEOUT: "30"
          API_KEY: "${{ secrets.INTEGRATIONS_API_KEY }}"
        run: |
          set -euxo pipefail
          uv run pytest -q -ra --maxfail=1 --disable-warnings \
            --base-url "${{ steps.live_inputs.outputs.base_url }}" \
            --api-key "${API_KEY}" \
            --junitxml pytest-server-live.xml \
            test_server_live

      - name: Upload live integrations junit report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integrations-junit-server-live
          path: integrations/pytest-server-live.xml
          if-no-files-found: ignore

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== integrations live debug ==="
          uv --version
          python -V
          uv pip list
          git status --porcelain || true


  # -------------------------
  # Repo-level auxiliary test suites
  # -------------------------
  repo_aux_tests:
    name: repo-tests (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: cli
            path: cli/tests
          - name: config
            path: config/tests
          - name: contracts
            path: contracts/tests
          - name: deploy
            path: deploy/tests
          - name: schemas
            path: schemas/tests
          - name: simulations
            path: simulations/tests
          - name: tools
            path: tools/tests
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          set -euxo pipefail
          pipx install uv
          uv --version
          python -V

      - name: Sync deps (repo)
        run: |
          set -euxo pipefail
          uv sync --extra dev

      - name: Run auxiliary test suite
        env:
          PYTHONPATH: "${{ github.workspace }}"
        run: |
          set -euxo pipefail
          uv run python -m pytest -q -ra --maxfail=1 --disable-warnings "${{ matrix.suite.path }}"

      - name: Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "=== repo auxiliary tests debug (${{ matrix.suite.path }}) ==="
          uv --version
          python -V
          uv pip list
          git status --porcelain || true
