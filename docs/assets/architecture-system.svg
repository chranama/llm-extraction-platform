  <path d="M420 446 C460 390 500 346 600 312" stroke="#7c3aed" stroke-width="3" stroke-dasharray="10 7" fill="none" marker-end="url(#arrowDashed)"/>

  <path d="M430 312 C520 470 740 620 842 680" stroke="#0f766e" stroke-width="3" stroke-dasharray="2 10" fill="none" marker-end="url(#arrowDotted)"/>
  <path d="M988 312 C980 460 985 580 987 640" stroke="#0f766e" stroke-width="3" stroke-dasharray="2 10" fill="none" marker-end="url(#arrowDotted)"/>
  <path d="M770 538 C815 590 860 625 900 650" stroke="#0f766e" stroke-width="3" stroke-dasharray="2 10" fill="none" marker-end="url(#arrowDotted)"/>
  <path d="M1132 691 L1182 691" stroke="#0f766e" stroke-width="3" stroke-dasharray="2 10" fill="none" marker-end="url(#arrowDotted)"/>

