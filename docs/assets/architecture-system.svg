  <text x="1192" y="258" class="nodeText">Model Router</text>
  <text x="1180" y="281" class="nodeSub">Runtime selection</text>

  <rect x="1368" y="176" width="170" height="78" rx="12" fill="#ffffff" stroke="#93c5fd"/>
  <text x="1392" y="217" class="nodeText">Transformers</text>

  <rect x="1368" y="266" width="170" height="78" rx="12" fill="#ffffff" stroke="#93c5fd"/>
  <text x="1410" y="307" class="nodeText">llama.cpp</text>

  <rect x="330" y="446" width="250" height="92" rx="12" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="356" y="484" class="nodeText">Evaluation Harness</text>
  <text x="356" y="507" class="nodeSub">Offline benchmark jobs</text>

  <rect x="640" y="446" width="260" height="92" rx="12" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="674" y="484" class="nodeText">Policy Config Store</text>
  <text x="676" y="507" class="nodeSub">Model onboarding states</text>

  <rect x="842" y="640" width="290" height="102" rx="12" fill="#ffffff" stroke="#5eead4"/>
  <text x="875" y="682" class="nodeText">Observability</text>
  <text x="873" y="705" class="nodeSub">Logs, metrics, diagnostics</text>

  <rect x="1182" y="640" width="330" height="102" rx="12" fill="#ffffff" stroke="#5eead4"/>
  <text x="1216" y="682" class="nodeText">Proof Artifacts</text>
  <text x="1216" y="705" class="nodeSub">Manifest + PASS/FAIL outputs</text>

