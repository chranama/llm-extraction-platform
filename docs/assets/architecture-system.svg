<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LLM Extraction Platform Architecture</title>
  <desc id="desc">Runtime request flow, control plane policy loop, and evidence pipeline for the LLM Extraction Platform.</desc>

  <defs>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .laneLabel { font: 700 16px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #1e293b; }
      .nodeText { font: 600 18px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .nodeSub { font: 500 14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .legend { font: 600 13px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .callout { font: 700 14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #1d4ed8; }
    </style>

    <marker id="arrowSolid" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f4fa8"/>
    </marker>
    <marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowDotted" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>
  <rect x="36" y="120" width="1528" height="262" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <rect x="36" y="406" width="1528" height="152" rx="16" fill="#f5f3ff" stroke="#ddd6fe"/>
  <rect x="36" y="582" width="1528" height="232" rx="16" fill="#f0fdfa" stroke="#99f6e4"/>

  <text x="52" y="66" class="title">LLM Extraction Platform: Runtime, Control, and Evidence Architecture</text>
  <text x="52" y="95" class="subtitle">Runtime, control, and evidence architecture</text>

  <text x="58" y="148" class="laneLabel">Runtime Plane</text>
  <text x="58" y="434" class="laneLabel">Control Plane</text>
  <text x="58" y="610" class="laneLabel">Evidence Plane</text>

  <rect x="78" y="220" width="180" height="92" rx="12" fill="#ffffff" stroke="#93c5fd"/>
  <text x="106" y="258" class="nodeText">Client /</text>
  <text x="100" y="282" class="nodeText">Reviewer</text>

  <rect x="308" y="220" width="220" height="92" rx="12" fill="#ffffff" stroke="#93c5fd"/>
  <text x="343" y="258" class="nodeText">FastAPI Service</text>
  <text x="336" y="281" class="nodeSub">Generate / Extract</text>

  <rect x="578" y="220" width="250" height="92" rx="12" fill="#ffffff" stroke="#93c5fd"/>
