  <text x="615" y="281" class="nodeSub">Schemas and validation</text>

  <rect x="878" y="220" width="220" height="92" rx="12" fill="#ffffff" stroke="#93c5fd"/>
  <text x="913" y="258" class="nodeText">Capability Gate</text>
  <text x="918" y="281" class="nodeSub">Allow / deny extract</text>

