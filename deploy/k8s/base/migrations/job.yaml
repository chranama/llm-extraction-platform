# deploy/k8s/base/migrations/job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: llm
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600

  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: Never

      containers:
        - name: migrate
          image: llm-server:dev
          imagePullPolicy: IfNotPresent

          env:
            - name: ENV
              value: "dev"

            - name: APP_ROOT
              value: "/app"

            - name: APP_CONFIG_PATH
              value: "/app/config/server.yaml"

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: DATABASE_URL

            # Explicit safety: migrations should not require redis
            - name: REDIS_ENABLED
              value: "false"

          volumeMounts:
            - name: llm-config
              mountPath: /app/config
              readOnly: true

          command:
            - sh
            - -lc
            - |
              set -euo pipefail

              echo "Waiting for database readiness..."
              for i in $(seq 1 60); do
                if python -c "import socket; s = socket.create_connection(('postgres', 5432), 5); s.close()"; then
                  echo "ok"
                  break
                fi
                sleep 2
              done

              echo "Running alembic migrations..."
              python -m alembic -c /app/server/alembic.ini upgrade head

      volumes:
        - name: llm-config
          configMap:
            name: llm-config
            items:
              - key: server.yaml
                path: server.yaml
